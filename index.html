        :root {
            --primary: #00f2ff;
            --success: #00ff88;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg); color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow-x: hidden; height: 100vh;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* شاشة الدخول */
        #entry-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; cursor: pointer;
        }

        .fingerprint-container {
            position: relative; width: 150px; height: 200px;
            display: flex; justify-content: center; align-items: center;
        }

        .fingerprint-img {
            width: 120px; fill: none; stroke: var(--primary);
            stroke-width: 0.5; filter: drop-shadow(0 0 5px var(--primary)); opacity: 0.7;
        }

        .scanner-line {
            position: absolute; width: 140px; height: 2px;
            background: var(--primary); box-shadow: 0 0 15px var(--primary);
            top: 0; animation: scan 3s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { top: 10%; opacity: 0.2; }
            50% { top: 90%; opacity: 1; }
        }

        /* المحتوى الرئيسي */
        #main-wrapper {
            display: none; padding: 30px 20px; max-width: 450px;
            margin: auto; text-align: center; opacity: 0;
            transform: scale(0.9); transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hero-img {
            width: 130px; height: 130px; border-radius: 50%;
            border: 2px solid var(--primary); margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); object-fit: cover;
        }

        .hero-title {
            font-size: 3rem; font-weight: 900; margin: 10px 0; letter-spacing: 5px;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .smart-card {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
            padding: 18px; margin-bottom: 12px; transition: 0.2s;
            cursor: pointer; user-select: none;
        }

        .smart-card:active {
            border: 1.5px solid var(--success);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .btn {
            display: block; width: 100%; padding: 16px; margin: 12px 0;
            border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.3s;
            box-sizing: border-box;
        }
        .btn-p { background: var(--primary); color: #000; }
        .btn-s { border: 1px solid rgba(255,255,255,0.2); color: #fff; }

        .footer { margin-top: 30px; opacity: 0.3; font-size: 0.8rem; }
    </style>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let dots = [];
        for(let i=0; i<60; i++) dots.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:Math.random()*0.4-0.2, vy:Math.random()*0.4-0.2});
        
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 242, 255, 0.15)";
            dots.forEach(d => {
                d.x += d.vx; d.y += d.vy;
                if(d.x<0 || d.x>canvas.width) d.vx*=-1;
                if(d.y<0 || d.y>canvas.height) d.vy*=-1;
                ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        function startSystem() {
            document.getElementById('h-audio').play().catch(()=>{});
            document.getElementById('entry-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('entry-screen').style.display = 'none';
                const w = document.getElementById('main-wrapper');
                w.style.display = 'block';
                setTimeout(() => { w.style.opacity = '1'; w.style.transform = 'scale(1)'; }, 50);
            }, 800);
        }
